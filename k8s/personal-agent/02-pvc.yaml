apiVersion: v1
kind: PersistentVolume
metadata:
  name: agent-data-pv
  labels:
    app.kubernetes.io/part-of: personal-agent
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: agent-local
  hostPath:
    path: /opt/personal-agent/data
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: personal-agent
              operator: In
              values:
                - "true"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agent-data
  namespace: personal-agent
  labels:
    app.kubernetes.io/part-of: personal-agent
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: agent-local
  resources:
    requests:
      storage: 5Gi
