apiVersion: batch/v1
kind: CronJob
metadata:
  name: market-monitor
  namespace: personal-agent
  labels:
    app: market-monitor
    app.kubernetes.io/part-of: personal-agent
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          nodeSelector:
            personal-agent: "true"
          containers:
            - name: monitor
              image: josecarlosjr/app-cla-agent:sha-7d2d55a
              command: ["python", "monitor.py"]
              envFrom:
                - secretRef:
                    name: agent-secrets
              env:
                - name: DATA_DIR
                  value: /data
              volumeMounts:
                - name: agent-data
                  mountPath: /data
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 300m
                  memory: 256Mi
          volumes:
            - name: agent-data
              persistentVolumeClaim:
                claimName: agent-data
          restartPolicy: OnFailure
