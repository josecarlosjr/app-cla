apiVersion: batch/v1
kind: CronJob
metadata:
  name: pattern-analysis
  namespace: personal-agent
  labels:
    app: pattern-analysis
    app.kubernetes.io/part-of: personal-agent
spec:
  schedule: "0 10,18 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          nodeSelector:
            personal-agent: "true"
          containers:
            - name: pattern-analysis
              image: josecarlosjr/app-cla-agent:sha-4679890
              command: ["sh", "-c", "python pattern_matcher.py && python trend_scorer.py"]
              envFrom:
                - secretRef:
                    name: agent-secrets
              env:
                - name: DATA_DIR
                  value: /data
              volumeMounts:
                - name: agent-data
                  mountPath: /data
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: agent-data
              persistentVolumeClaim:
                claimName: agent-data
          restartPolicy: OnFailure
