apiVersion: apps/v1
kind: Deployment
metadata:
  name: personal-agent-api
  namespace: personal-agent
  labels:
    app: personal-agent-api
    app.kubernetes.io/part-of: personal-agent
spec:
  # SQLite WAL serialises all writers; running >1 replica against the same
  # file just queues writes on the same node (the PV is hostPath with
  # nodeAffinity, so both replicas land on the same disk anyway — no real
  # HA is gained). Stay at 1 until time-series tables migrate to Postgres
  # and we can split readers from writers cleanly.
  replicas: 1
  strategy:
    # Recreate avoids the brief overlap during a rolling deploy where two
    # uvicorn processes would both try to grab the SQLite write lock.
    type: Recreate
  selector:
    matchLabels:
      app: personal-agent-api
  template:
    metadata:
      labels:
        app: personal-agent-api
    spec:
      nodeSelector:
        personal-agent: "true"
      containers:
        - name: api
          image: josecarlosjr/app-cla-agent:sha-da535cb
          command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            # agent-secrets: ANTHROPIC_API_KEY + TELEGRAM tokens used by
            # interactive endpoints.
            - secretRef:
                name: agent-secrets
            # postgres-secrets: DATABASE_URL + PIA_DB_* — needed by the
            # /api/quant/* endpoints (lazy-imported pg_database). Without
            # this, /api/quant/dashboard returns "Postgres credentials
            # missing" because the DSN can't be built.
            - secretRef:
                name: postgres-secrets
          env:
            - name: DATA_DIR
              value: /data
          volumeMounts:
            - name: agent-data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /openapi.json
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /openapi.json
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 15
      volumes:
        - name: agent-data
          persistentVolumeClaim:
            claimName: agent-data
