apiVersion: batch/v1
kind: CronJob
metadata:
  name: digest-evening
  namespace: personal-agent
  labels:
    app: digest-evening
    app.kubernetes.io/part-of: personal-agent
spec:
  schedule: "0 21 * * *"
  timeZone: "Europe/Lisbon"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          nodeSelector:
            personal-agent: "true"
          containers:
            - name: digest-evening
              image: josecarlosjr/app-cla-agent:sha-57003b5
              command: ["python", "digest.py", "evening"]
              envFrom:
                - secretRef:
                    name: agent-secrets
              env:
                - name: DATA_DIR
                  value: /data
              volumeMounts:
                - name: agent-data
                  mountPath: /data
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 300m
                  memory: 256Mi
          volumes:
            - name: agent-data
              persistentVolumeClaim:
                claimName: agent-data
          restartPolicy: OnFailure
