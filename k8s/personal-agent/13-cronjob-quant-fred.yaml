apiVersion: batch/v1
kind: CronJob
metadata:
  name: quant-fred
  namespace: personal-agent
  labels:
    app: quant-fred
    app.kubernetes.io/part-of: personal-agent
spec:
  # FRED publishes most series daily/monthly/quarterly. Every 6h is
  # overkill for the data side but keeps the indicators fresh enough
  # for the future bubble-detector cron without coordinating schedules.
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          nodeSelector:
            personal-agent: "true"
          containers:
            - name: quant-fred
              # Bump this SHA after the next app-cla-image build that
              # includes pg_database.py + quant_fred.py — until then
              # the cron will fail with ModuleNotFoundError.
              image: josecarlosjr/app-cla-agent:sha-6cdaa1c
              command: ["python", "quant_fred.py"]
              envFrom:
                # FRED_API_KEY (register free at fredaccount.stlouisfed.org)
                - secretRef:
                    name: agent-secrets
                # DATABASE_URL + PIA_DB_* for the postgres connection
                - secretRef:
                    name: postgres-secrets
              env:
                - name: DATA_DIR
                  value: /data
              volumeMounts:
                - name: agent-data
                  mountPath: /data
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 300m
                  memory: 256Mi
          volumes:
            - name: agent-data
              persistentVolumeClaim:
                claimName: agent-data
          restartPolicy: OnFailure
