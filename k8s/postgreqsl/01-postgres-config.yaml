apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: personal-agent
data:
  postgresql.conf: |
    # Memory
    shared_buffers = 512MB
    effective_cache_size = 1GB
    work_mem = 8MB
    maintenance_work_mem = 128MB
    
    # Connections
    max_connections = 50
    
    # WAL
    wal_buffers = 16MB
    wal_compression = on
    checkpoint_completion_target = 0.9
    max_wal_size = 1GB
    min_wal_size = 80MB
    
    # SSD optimizations
    random_page_cost = 1.1
    effective_io_concurrency = 200
    
    # Logging
    log_min_duration_statement = 1000
    log_checkpoints = on
    log_connections = on
    log_disconnections = on
    log_lock_waits = on
    log_temp_files = 0
    log_autovacuum_min_duration = 0
    log_line_prefix = '%t [%p] %q%u@%d '
    
    # Statistics
    default_statistics_target = 100
    
    # TimescaleDB
    shared_preload_libraries = 'timescaledb'
    timescaledb.max_background_workers = 4
    
    # Autovacuum (importante para time-series)
    autovacuum = on
    autovacuum_max_workers = 3
    autovacuum_naptime = 30s
  
  init.sql: |
    -- Cria extensão TimescaleDB
    CREATE EXTENSION IF NOT EXISTS timescaledb CASCADE;
    
    -- Cria utilizador para a aplicação PIA
    CREATE USER pia WITH PASSWORD 'PLACEHOLDER_TO_BE_REPLACED';
    GRANT CONNECT ON DATABASE agent TO pia;
    GRANT USAGE ON SCHEMA public TO pia;
    GRANT CREATE ON SCHEMA public TO pia;
    GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO pia;
    GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO pia;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO pia;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO pia;
