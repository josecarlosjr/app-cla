# local-path-config-patch.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: local-path-config
  namespace: local-path-storage
data:
  config.json: |-
    {
      "nodePathMap": [
        {
          "node": "node-01",
          "paths": ["/var/lib/postgres-data"]
        },
        {
          "node": "DEFAULT_PATH_FOR_NON_LISTED_NODES",
          "paths": ["/opt/local-path-provisioner"]
        }
      ]
    }
  setup: |-
    #!/bin/sh
    set -eu
    mkdir -m 0777 -p "$VOL_DIR"
  teardown: |-
    #!/bin/sh
    set -eu
    rm -rf "$VOL_DIR"
  helperPod.yaml: |-
    apiVersion: v1
    kind: Pod
    metadata:
      name: helper-pod
    spec:
      # Tolerate any taint so the helper can run on control-plane
      # nodes (k3s default has NoSchedule on the master). Without
      # this, the pod sat in Pending and the PVC timed out at 120s.
      tolerations:
        - operator: Exists
      containers:
      - name: helper-pod
        # Rancher's busybox mirror — no Docker Hub rate limits, which
        # is what was stalling the original `image: busybox` pull and
        # producing "create process timeout after 120 seconds" on the
        # PVC. Pinned tag keeps the digest reproducible.
        image: rancher/mirrored-library-busybox:1.36.1
        imagePullPolicy: IfNotPresent
