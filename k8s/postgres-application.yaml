# argocd/postgres-application.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/josecarlosjr/app-cla.git
    targetRevision: main
    path: k8s/postgreqsl
    plugin:
      name: kustomize-with-ksops
  destination:
    server: https://kubernetes.default.svc
    namespace: personal-agent
  syncPolicy:
    automated:
      prune: false  # NUNCA auto-prune para Postgres
      selfHeal: true
    # ServerSideApply removed: incompatible with the --force flag that
    # ArgoCD's selfHeal injects on drift reconciliation. The error was
    # "--force cannot be used with --server-side". The personal-agent
    # Application uses native kubectl apply (no SSA option) and works.
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
